services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: racoai
      POSTGRES_USER: racoai
      POSTGRES_PASSWORD: racoai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    depends_on:
      - db
      - redis
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod-0123456789abcdef}
      DEBUG: "false"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://racoai:racoai@db:5432/racoai
      REDIS_URL: redis://redis:6379/0
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BKASH_BASE_URL: ${BKASH_BASE_URL:-}
      BKASH_APP_KEY: ${BKASH_APP_KEY:-}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET:-}
      BKASH_USERNAME: ${BKASH_USERNAME:-}
      BKASH_PASSWORD: ${BKASH_PASSWORD:-}
    ports:
      - "8000:8000"

volumes:
  pgdata:
